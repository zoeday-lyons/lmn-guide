<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LMN Job Execution Guide Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: #f5f5f2;
      min-height: 100vh;
      padding: 2rem 1rem;
      color: #1a1a18;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }

    .logo {
      background: #1a472a;
      color: #fff;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 5px;
      letter-spacing: 0.05em;
    }

    .header-title {
      font-size: 16px;
      font-weight: 500;
      color: #555;
    }

    .card {
      background: #fff;
      border: 1px solid #e0ddd6;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    .card-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 0.75rem;
    }

    .upload-zone {
      border: 1.5px dashed #ccc;
      border-radius: 10px;
      padding: 2.5rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
      background: #fafaf8;
    }

    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #1a472a;
      background: rgba(26, 71, 42, 0.03);
    }

    .upload-zone.has-file {
      border-style: solid;
      border-color: #1a472a;
      background: rgba(26, 71, 42, 0.03);
    }

    .upload-icon {
      font-size: 2rem;
      margin-bottom: 0.75rem;
      color: #aaa;
    }

    .upload-zone.has-file .upload-icon { color: #1a472a; }

    .upload-label {
      font-size: 14px;
      color: #666;
      margin-bottom: 4px;
    }

    .upload-zone.has-file .upload-label {
      color: #1a472a;
      font-weight: 500;
    }

    .upload-sub {
      font-size: 12px;
      color: #aaa;
    }

    .file-input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 6px;
    }

    .field input, .field select {
      width: 100%;
      height: 40px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 14px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0 0.75rem;
      color: #1a1a18;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input:focus, .field select:focus {
      border-color: #1a472a;
      box-shadow: 0 0 0 3px rgba(26, 71, 42, 0.1);
    }

    .generate-btn {
      width: 100%;
      height: 46px;
      background: #1a472a;
      color: #fff;
      border: none;
      border-radius: 9px;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 1.5rem;
    }

    .generate-btn:hover { background: #143d22; }
    .generate-btn:active { transform: scale(0.99); }
    .generate-btn:disabled { background: #aaa; cursor: not-allowed; transform: none; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #b91c1c;
      font-size: 13px;
      padding: 0.75rem 1rem;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
    }

    .output-area {
      display: none;
      background: #fff;
      border: 1px solid #e0ddd6;
      border-radius: 12px;
      overflow: hidden;
    }

    .output-header {
      background: #1a472a;
      color: #fff;
      padding: 0.85rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .output-header-title {
      font-size: 14px;
      font-weight: 500;
    }

    .output-badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      background: rgba(255,255,255,0.18);
      padding: 3px 10px;
      border-radius: 4px;
    }

    .output-body {
      padding: 1.5rem;
      font-size: 14px;
      line-height: 1.8;
      color: #1a1a18;
      white-space: pre-wrap;
    }

    .print-btn {
      display: block;
      width: 100%;
      margin-top: 0.75rem;
      padding: 0.6rem;
      background: transparent;
      border: 1px solid #1a472a;
      border-radius: 8px;
      color: #1a472a;
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .print-btn:hover { background: rgba(26,71,42,0.05); }

    @media print {
      body { background: #fff; padding: 0; }
      .card, .generate-btn, .print-btn, .upload-zone { display: none; }
      .output-area { display: block !important; border: none; }
      .output-header { background: #1a472a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <span class="logo">LMN</span>
      <span class="header-title">Job Execution Guide Generator</span>
    </div>

    <div class="card">
      <div class="card-label">Job plan PDF</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" class="file-input" id="pdfInput" accept=".pdf" />
        <div class="upload-icon">📄</div>
        <div class="upload-label" id="uploadLabel">Drop your LMN job plan PDF here, or click to browse</div>
        <div class="upload-sub" id="uploadSub">PDF files only</div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Job details</div>
      <div class="row">
        <div class="field">
          <label>Total hours budgeted</label>
          <input type="number" id="hours" placeholder="e.g. 8" min="1" max="24" />
        </div>
        <div class="field">
          <label>Crew size</label>
          <input type="number" id="crew" placeholder="e.g. 3" min="1" max="20" />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Job type</label>
          <select id="jobType">
            <option value="">Select...</option>
            <option>Lawn maintenance</option>
            <option>Landscape installation</option>
            <option>Hardscape / patio</option>
            <option>Irrigation</option>
            <option>Cleanup / seasonal</option>
            <option>Tree / shrub work</option>
            <option>Snow removal</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field">
          <label>Special notes</label>
          <input type="text" id="notes" placeholder="e.g. gate code, dog on site..." />
        </div>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <button class="generate-btn" id="generateBtn" onclick="generateGuide()">
      <span class="spinner" id="spinner"></span>
      <span id="btnText">Generate execution guide</span>
    </button>

    <div class="output-area" id="outputArea">
      <div class="output-header">
        <span class="output-header-title">Step-by-step execution guide</span>
        <span class="output-badge" id="outputBadge"></span>
      </div>
      <div class="output-body" id="outputBody"></div>
    </div>

    <button class="print-btn" id="printBtn" style="display:none" onclick="window.print()">Print / Save as PDF</button>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let extractedText = '';

    const pdfInput = document.getElementById('pdfInput');
    const uploadZone = document.getElementById('uploadZone');
    const uploadLabel = document.getElementById('uploadLabel');
    const uploadSub = document.getElementById('uploadSub');

    pdfInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) loadFile(file);
    });

    uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => { uploadZone.classList.remove('drag-over'); });
    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type === 'application/pdf') loadFile(file);
    });

    async function loadFile(file) {
      uploadLabel.textContent = 'Reading PDF...';
      uploadSub.textContent = '';
      uploadZone.classList.add('has-file');
      try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let text = '';
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          text += content.items.map(item => item.str).join(' ') + '\n';
        }
        extractedText = text.trim();
        uploadLabel.textContent = file.name;
        uploadSub.textContent = `${pdf.numPages} page${pdf.numPages > 1 ? 's' : ''} · ready`;
      } catch(err) {
        uploadZone.classList.remove('has-file');
        uploadLabel.textContent = 'Drop your LMN job plan PDF here, or click to browse';
        uploadSub.textContent = 'Could not read PDF — try another file';
        extractedText = '';
      }
    }

    async function generateGuide() {
      const hours = document.getElementById('hours').value.trim();
      const crew = document.getElementById('crew').value.trim();
      const jobType = document.getElementById('jobType').value;
      const notes = document.getElementById('notes').value.trim();
      const errorMsg = document.getElementById('errorMsg');
      const outputArea = document.getElementById('outputArea');
      const outputBody = document.getElementById('outputBody');
      const outputBadge = document.getElementById('outputBadge');
      const btn = document.getElementById('generateBtn');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btnText');
      const printBtn = document.getElementById('printBtn');

      errorMsg.style.display = 'none';

      if (!extractedText) {
        errorMsg.textContent = 'Please upload your LMN job plan PDF first.';
        errorMsg.style.display = 'block';
        return;
      }
      if (!hours) {
        errorMsg.textContent = 'Please enter the total hours budgeted for this job.';
        errorMsg.style.display = 'block';
        return;
      }

      btn.disabled = true;
      spinner.style.display = 'block';
      btnText.textContent = 'Generating...';
      outputArea.style.display = 'none';
      printBtn.style.display = 'none';
      outputBody.textContent = '';

      const crewLabel = crew ? `${crew}-person crew` : 'crew';
      const jobLabel = jobType || 'landscaping job';
      const notesLine = notes ? `\nSite notes: ${notes}` : '';

      const prompt = `You are an expert landscaping foreman assistant. Below is text extracted from an LMN job plan. Write a clear, practical step-by-step execution guide for the foreman.

Job type: ${jobLabel}
Total hours budgeted: ${hours} hours
Crew size: ${crew || 'unknown'}${notesLine}

LMN job plan:
${extractedText}

Write a detailed step-by-step execution guide formatted as time blocks (e.g. "0:00 – 0:45") with a clear task title and 1-2 sentences of practical instruction per block. Include setup/arrival, each major work phase in logical order, equipment or material notes, and a wrap-up block. Size the blocks to fit the total hours. Output ONLY the guide, no preamble.`;

      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });

        const data = await response.json();

        if (!response.ok) throw new Error(data.error || 'Server error');

        outputBadge.textContent = `${hours}h · ${crewLabel}`;
        outputArea.style.display = 'block';
        printBtn.style.display = 'block';
        outputBody.textContent = data.result;

      } catch(err) {
        errorMsg.textContent = `Error: ${err.message || 'Something went wrong. Please try again.'}`;
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
        btnText.textContent = 'Generate execution guide';
      }
    }
  </script>
</body>
</html>
